<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 互动信封</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="controls">
        <button id="open-btn">打开信封</button>
        <button id="view-content-1" class="hidden">查看内容 A</button>
        <button id="view-content-2" class="hidden">查看内容 B</button>
        <button id="close-content" class="hidden">关闭内容</button>
    </div>

    <div id="overlay" class="hidden">
        <img id="content-image" src="" alt="信件内容">
    </div>

    <script src="./main.js"></script>
</body>
</html>
